<!-- Event Tracking Scripts -->
<script>
// Track form submissions
document.addEventListener('DOMContentLoaded', function() {
  
  // Contact Form Tracking
  const contactForm = document.querySelector('form[name="contact"], form#contact-form, form.contact-form');
  
  if (contactForm) {
    // Track form start
    contactForm.addEventListener('focus', function(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
        // Facebook Pixel
        fbq('track', 'InitiateCheckout');
        
        // Google Analytics
        gtag('event', 'form_start', {
          form_name: 'contact_form',
          form_destination: '/thank-you'
        });
      }
    }, true);
    
    // Track form submission
    contactForm.addEventListener('submit', function(e) {
      // Facebook Pixel - Lead event
      fbq('track', 'Lead', {
        content_name: 'Contact Form',
        content_category: 'Lead Generation',
        value: 50.00,
        currency: 'CAD'
      });
      
      // Google Analytics - Lead event
      gtag('event', 'generate_lead', {
        currency: 'CAD',
        value: 50.00,
        lead_source: 'contact_form'
      });
    });
  }
  
  // Phone Click Tracking
  const phoneLinks = document.querySelectorAll('a[href^="tel:"]');
  
  phoneLinks.forEach(function(link) {
    link.addEventListener('click', function() {
      // Facebook Pixel
      fbq('track', 'Contact', {
        content_name: 'Phone Click',
        content_category: 'Lead Generation'
      });
      
      // Google Analytics
      gtag('event', 'phone_call', {
        call_source: 'website',
        phone_number: this.getAttribute('href')
      });
    });
  });
  
  // Booking Widget Tracking (if applicable)
  const bookingButton = document.querySelector('.book-appointment, [data-booking], .schedule-btn');
  
  if (bookingButton) {
    bookingButton.addEventListener('click', function() {
      // Facebook Pixel
      fbq('track', 'Schedule', {
        content_name: 'Book Appointment',
        value: 85.00,
        currency: 'CAD'
      });
      
      // Google Analytics
      gtag('event', 'booking_initiated', {
        value: 85.00,
        currency: 'CAD'
      });
    });
  }
});
</script>

<!-- Enhanced Conversion Tracking for Thank You Page -->

<script>

    'currency': 'CAD',
    'transaction_id': ''
  });
}
</script>

<!-- UTM Parameter Capture -->
<!-- Captures UTM parameters and stores them for form submission -->
<script>
(function() {
  // Get URL parameters
  const urlParams = new URLSearchParams(window.location.search);
  const utmParams = {
    utm_source: urlParams.get('utm_source'),
    utm_medium: urlParams.get('utm_medium'),
    utm_campaign: urlParams.get('utm_campaign'),
    utm_content: urlParams.get('utm_content'),
    utm_term: urlParams.get('utm_term')
  };
  
  // Store in sessionStorage
  if (utmParams.utm_source) {
    sessionStorage.setItem('utmParams', JSON.stringify(utmParams));
  }
  
  // Add to form submission
  document.addEventListener('DOMContentLoaded', function() {
    const forms = document.querySelectorAll('form');
    
    forms.forEach(function(form) {
      form.addEventListener('submit', function() {
        const storedParams = sessionStorage.getItem('utmParams');
        
        if (storedParams) {
          const params = JSON.parse(storedParams);
          
          // Create hidden fields for each UTM parameter
          Object.keys(params).forEach(function(key) {
            if (params[key]) {
              const input = document.createElement('input');
              input.type = 'hidden';
              input.name = key;
              input.value = params[key];
              form.appendChild(input);
            }
          });
        }
      });
    });
  });
})();
</script>
